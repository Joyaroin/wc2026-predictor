server {
    listen 8080;
    server_name _;
    server_tokens off; # don't leak the nginx version in the Server header / error pages
    root /usr/share/nginx/html;
    index index.html;

    # Security headers for every response ('always' so they apply to errors too).
    # CSP is kept permissive enough for the SPA: same-origin scripts/assets, inline styles
    # (some libraries inject <style>), data: images, and XHR/fetch to the same origin (the
    # API is reached same-origin via the ingress at /api/*).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # SPA fallback: unknown paths return index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The SPA entry point must always be revalidated so clients pick up new asset hashes
    # immediately after a deploy (otherwise a cached index.html points at stale bundles).
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        # Re-assert security headers: add_header in a location replaces inherited ones.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    }

    # Long-cache hashed assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        # Re-assert security headers (add_header in a location replaces inherited ones).
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    }
}
