name: ci

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build --workspace @wc2026/shared
      - run: npm test
      - run: npm audit --omit=dev

  images:
    # Build + push public images to GHCR on pushes to main (dev) / release (prod promotion).
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the values-dev SHA bump (auto-deploy to dev)
      packages: write # push to GHCR
    env:
      REGISTRY: ghcr.io/joyaroin
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push (env tag + git SHA)
        run: |
          SHA=${{ github.sha }}
          # main → "dev" (auto-deployed); release → "prod".
          if [ "$GITHUB_REF_NAME" = "release" ]; then ENVTAG=prod; else ENVTAG=dev; fi
          docker buildx build --platform linux/arm64 -f api/Dockerfile \
            -t "$REGISTRY/wc2026-api:$SHA" -t "$REGISTRY/wc2026-api:$ENVTAG" \
            --push .
          docker buildx build --platform linux/arm64 -f web/Dockerfile \
            --build-arg VITE_API_URL="" \
            -t "$REGISTRY/wc2026-web:$SHA" -t "$REGISTRY/wc2026-web:$ENVTAG" \
            --push .

      - name: Auto-deploy to dev (pin values-dev to this SHA)
        if: github.ref_name == 'main'
        run: |
          export SHA=${{ github.sha }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main && git pull --rebase origin main
          yq -i '.image.api.tag = strenv(SHA) | .image.web.tag = strenv(SHA)' infra/helm/wc2026/values-dev.yaml
          git add infra/helm/wc2026/values-dev.yaml
          # [skip ci] avoids re-triggering this workflow on the bot commit.
          git commit -m "chore(dev): deploy ${SHA} [skip ci]" || { echo "dev already on this SHA"; exit 0; }
          git push origin main
      # prod is promoted via the `promote-to-prod` workflow (commit-SHA pinned, approved).
