name: ci

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build --workspace @wc2026/shared
      # Typecheck api/web (+ shared emit) and run the web production build so type/bundle
      # breakage is caught in PRs, not post-merge. (`npm test` is vitest; it does not typecheck.)
      - run: npm run build --workspaces --if-present
      # Validate the esbuild production server bundle for the api.
      - run: npm run build:server --workspace @wc2026/api
      - run: npm test
      # Fail CI only on high/critical runtime advisories; low/moderate are reported but
      # don't block (avoids flaky CI on transient low-severity advisories).
      - run: npm audit --omit=dev --audit-level=high

  images:
    # Build + push public images to GHCR on pushes to main (dev) / release (prod promotion).
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # Serialize per-branch so concurrent pushes to main don't race on the auto-deploy
    # commit/push below. cancel-in-progress:false → every push still gets deployed (queued).
    concurrency:
      group: deploy-dev-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write # push the values-dev SHA bump (auto-deploy to dev)
      packages: write # push to GHCR
    env:
      REGISTRY: ghcr.io/joyaroin
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push (env tag + git SHA)
        run: |
          SHA=${{ github.sha }}
          # main → "dev" (auto-deployed); release → "prod".
          if [ "$GITHUB_REF_NAME" = "release" ]; then ENVTAG=prod; else ENVTAG=dev; fi
          docker buildx build --platform linux/arm64 -f api/Dockerfile \
            -t "$REGISTRY/wc2026-api:$SHA" -t "$REGISTRY/wc2026-api:$ENVTAG" \
            --push .
          docker buildx build --platform linux/arm64 -f web/Dockerfile \
            --build-arg VITE_API_URL="" \
            -t "$REGISTRY/wc2026-web:$SHA" -t "$REGISTRY/wc2026-web:$ENVTAG" \
            --push .

      - name: Auto-deploy to dev (pin values-dev to this SHA)
        if: github.ref_name == 'main'
        env:
          SHA: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          # Re-derive the bump from a clean, up-to-date main on every attempt. A concurrent
          # human push that touches values-dev.yaml would leave a `git pull --rebase` mid-rebase
          # and wedge the loop; resetting to origin/main each time avoids that failure mode.
          for attempt in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            git fetch origin main
            git reset --hard origin/main
            yq -i '.image.api.tag = strenv(SHA) | .image.web.tag = strenv(SHA)' infra/helm/wc2026/values-dev.yaml
            git add infra/helm/wc2026/values-dev.yaml
            # [skip ci] avoids re-triggering this workflow on the bot commit.
            git commit -m "chore(dev): deploy ${SHA} [skip ci]" || { echo "dev already on this SHA"; exit 0; }
            if git push origin main; then echo "Pushed dev deploy on attempt ${attempt}"; exit 0; fi
            echo "Push attempt ${attempt} lost the race; retrying after backoff..."
            sleep $((attempt * 5))
          done
          echo "::error::Failed to push values-dev bump after 5 attempts"; exit 1
      # prod is promoted via the `promote-to-prod` workflow (commit-SHA pinned, approved).
