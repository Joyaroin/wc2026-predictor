# DynamoDB Local for development (decision: backend NFR Q1=B).
# Usage: docker compose up -d  then  npm run create-table
services:
  dynamodb-local:
    image: amazon/dynamodb-local:2.5.4
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    ports:
      # Bind to loopback only — DynamoDB-Local has no auth, so it must not be reachable
      # from other hosts on the network.
      - "127.0.0.1:8000:8000"
