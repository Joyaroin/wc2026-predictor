apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: wc2026
  namespace: argocd
spec:
  description: WC2026 Predictor
  sourceRepos:
    - https://github.com/Joyaroin/wc2026-predictor.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: wc2026-dev
    - server: https://kubernetes.default.svc
      namespace: wc2026-prod
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  # Restrict to only the namespaced kinds the wc2026 Helm chart actually deploys,
  # so a compromised/misconfigured source repo can't create arbitrary RBAC, etc.
  namespaceResourceWhitelist:
    - group: apps
      kind: Deployment
    - group: ""
      kind: Service
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: ServiceAccount
    - group: networking.k8s.io
      kind: Ingress
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    - group: batch
      kind: CronJob
