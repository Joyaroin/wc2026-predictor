# prod: tracks the `release` ref. Promote via the `promote-to-prod` GitHub workflow
# (which requires approval, then pins a commit-SHA image and pushes to `release`).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wc2026-prod
  namespace: argocd
spec:
  project: wc2026
  source:
    repoURL: https://github.com/Joyaroin/wc2026-predictor.git
    targetRevision: release
    path: infra/helm/wc2026
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: wc2026-prod
  syncPolicy:
    # Auto-sync: the approval gate is the `promote-to-prod` GitHub workflow (production
    # environment). Once a promotion lands on `release`, ArgoCD deploys it automatically.
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
