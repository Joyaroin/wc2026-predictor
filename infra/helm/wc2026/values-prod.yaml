environment: prod

image:
  registry: ghcr.io/joyaroin
  api: { repository: wc2026-api, tag: prod } # optionally pin a built SHA at promotion time
  web: { repository: wc2026-web, tag: prod }

api:
  replicas: 1 # single small node — keep modest; bump with a larger instance
  env:
    TABLE_NAME: wc2026-prod
    ALLOWED_ORIGIN: http://REPLACE-EIP.nip.io

serviceAccount:
  roleArn: ""

secret:
  existingSecret: wc2026-secrets

ingress:
  host: REPLACE-EIP.nip.io
  tls:
    enabled: false
  certManager:
    clusterIssuer: ""

hpa:
  enabled: false
