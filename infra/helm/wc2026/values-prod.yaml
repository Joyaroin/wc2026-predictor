environment: prod
image:
  registry: ghcr.io/joyaroin
  pullPolicy: Always
  api: {repository: wc2026-api, tag: 4caba4ecb9e7a8a3b4c331a1f994c23b2cbe6979} # optionally pin a built SHA at promotion time
  web: {repository: wc2026-web, tag: 4caba4ecb9e7a8a3b4c331a1f994c23b2cbe6979}
api:
  replicas: 1 # single small node — keep modest; bump with a larger instance
  env:
    TABLE_NAME: wc2026-prod
    ALLOWED_ORIGIN: https://wc-predictions-2026.com
    ADMIN_PLAYER_ID: 0cfd530d-b667-4913-82e1-db9877ec32dd
serviceAccount:
  roleArn: ""
secret:
  existingSecret: wc2026-secrets
ingress:
  host: wc-predictions-2026.com
  tls:
    enabled: true
    secretName: wc2026-prod-tls
  certManager:
    clusterIssuer: letsencrypt-prod
hpa:
  enabled: false
