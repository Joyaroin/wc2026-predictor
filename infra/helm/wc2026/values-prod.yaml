environment: prod
image:
  registry: ghcr.io/joyaroin
  pullPolicy: Always
  api: {repository: wc2026-api, tag: 7420684a60f23444c1aaf4ad859049471d25a519} # optionally pin a built SHA at promotion time
  web: {repository: wc2026-web, tag: 7420684a60f23444c1aaf4ad859049471d25a519}
api:
  replicas: 1 # single small node — keep modest; bump with a larger instance
  env:
    TABLE_NAME: wc2026-prod
    ALLOWED_ORIGIN: https://wc-predictions-2026.com
serviceAccount:
  roleArn: ""
secret:
  existingSecret: wc2026-secrets
ingress:
  host: wc-predictions-2026.com
  tls:
    enabled: true
    secretName: wc2026-prod-tls
  certManager:
    clusterIssuer: letsencrypt-prod
hpa:
  enabled: false
