environment: prod

image:
  registry: ghcr.io/joyaroin
  pullPolicy: Always
  api: { repository: wc2026-api, tag: f8368e09419cca5ff344d2e34dad4a2d1229284f } # optionally pin a built SHA at promotion time
  web: { repository: wc2026-web, tag: f8368e09419cca5ff344d2e34dad4a2d1229284f }

api:
  replicas: 1 # single small node — keep modest; bump with a larger instance
  env:
    TABLE_NAME: wc2026-prod
    ALLOWED_ORIGIN: https://wc-predictions-2026.com

serviceAccount:
  roleArn: ""

secret:
  existingSecret: wc2026-secrets

ingress:
  host: wc-predictions-2026.com
  tls:
    enabled: true
    secretName: wc2026-prod-tls
  certManager:
    clusterIssuer: letsencrypt-prod

hpa:
  enabled: false
