environment: dev
# Public GHCR images (no registry auth needed on the cluster).
image:
  registry: ghcr.io/joyaroin
  pullPolicy: Always
  api: {repository: wc2026-api, tag: b2d042e65d16de32d594b188810ac03cb63f8708}
  web: {repository: wc2026-web, tag: b2d042e65d16de32d594b188810ac03cb63f8708}
api:
  replicas: 1
  env:
    TABLE_NAME: wc2026-dev
    ALLOWED_ORIGIN: https://dev.wc-predictions-2026.com
    ADMIN_PLAYER_ID: 9d528d5e-375f-44af-b96f-e59afc9a1faa
serviceAccount:
  roleArn: "" # k3s on EC2 uses the node instance role for DynamoDB — no IRSA
secret:
  existingSecret: wc2026-secrets # created by the k3s bootstrap
ingress:
  host: dev.wc-predictions-2026.com
  tls:
    enabled: true
    secretName: wc2026-dev-tls
  certManager:
    clusterIssuer: letsencrypt-prod
hpa:
  enabled: false
