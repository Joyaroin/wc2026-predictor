environment: dev

# Public GHCR images (no registry auth needed on the cluster).
image:
  registry: ghcr.io/joyaroin
  pullPolicy: Always
  api: { repository: wc2026-api, tag: dev }
  web: { repository: wc2026-web, tag: dev }

api:
  replicas: 1
  env:
    TABLE_NAME: wc2026-dev
    # Replace REPLACE-EIP with your dashed EC2 EIP (see `terraform output app_url_dev`).
    ALLOWED_ORIGIN: http://dev.52-203-104-117.nip.io

serviceAccount:
  roleArn: "" # k3s on EC2 uses the node instance role for DynamoDB — no IRSA

secret:
  existingSecret: wc2026-secrets # created by the k3s bootstrap

ingress:
  host: dev.52-203-104-117.nip.io
  tls:
    enabled: false # add a domain + cert-manager later for HTTPS
  certManager:
    clusterIssuer: ""

hpa:
  enabled: false
