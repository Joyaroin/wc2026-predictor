environment: dev
# Public GHCR images (no registry auth needed on the cluster).
image:
  registry: ghcr.io/joyaroin
  pullPolicy: Always
  api: {repository: wc2026-api, tag: e45729d4d1490d88af6dd51a17bb2d5443b81307}
  web: {repository: wc2026-web, tag: e45729d4d1490d88af6dd51a17bb2d5443b81307}
api:
  replicas: 1
  env:
    TABLE_NAME: wc2026-dev
    ALLOWED_ORIGIN: https://dev.wc-predictions-2026.com
serviceAccount:
  roleArn: "" # k3s on EC2 uses the node instance role for DynamoDB — no IRSA
secret:
  existingSecret: wc2026-secrets # created by the k3s bootstrap
ingress:
  host: dev.wc-predictions-2026.com
  tls:
    enabled: true
    secretName: wc2026-dev-tls
  certManager:
    clusterIssuer: letsencrypt-prod
hpa:
  enabled: false
