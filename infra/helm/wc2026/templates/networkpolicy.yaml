{{- if .Values.networkPolicy.enabled }}
# Baseline policy: allow ingress to the app ports and egress to DNS + HTTPS (DynamoDB / football API).
# Tighten the ingress source to the ingress-nginx namespace in real clusters.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wc2026-baseline
  labels:
    {{- include "wc2026.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow all traffic from the ingress-nginx controller — this covers the api/web ports
    # AND the cert-manager ACME HTTP-01 solver pods (which listen on their own port 8089).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 443
---
# API and sync pods need IMDS to exchange the EC2 instance role for AWS credentials.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wc2026-api-imds
  labels:
    {{- include "wc2026.labels" . | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - wc2026-api
          - wc2026-sync
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 80
{{- end }}
