{{- if .Values.livePoller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wc2026-live-poller
  labels:
    {{- include "wc2026.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate   # single writer — never two pollers at once
  selector:
    matchLabels:
      app: wc2026-live-poller
  template:
    metadata:
      labels:
        app: wc2026-live-poller
        {{- include "wc2026.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: live-poller
          image: {{ include "wc2026.apiImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "dist/sync-live.cjs"]
          envFrom:
            - configMapRef:
                name: wc2026-api-config
          env:
            - name: SESSION_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "wc2026.secretName" . }}
                  key: SESSION_SIGNING_SECRET
            - name: FOOTBALL_DATA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "wc2026.secretName" . }}
                  key: FOOTBALL_DATA_TOKEN
            - name: VAPID_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "wc2026.secretName" . }}
                  key: VAPID_PUBLIC_KEY
                  optional: true
            - name: VAPID_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "wc2026.secretName" . }}
                  key: VAPID_PRIVATE_KEY
                  optional: true
            - name: VAPID_SUBJECT
              valueFrom:
                secretKeyRef:
                  name: {{ include "wc2026.secretName" . }}
                  key: VAPID_SUBJECT
                  optional: true
          resources:
            {{- toYaml .Values.livePoller.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
{{- end }}
