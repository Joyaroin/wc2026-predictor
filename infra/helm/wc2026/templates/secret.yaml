{{- if .Values.secret.create }}
# Dev/test convenience only. In real clusters use external-secrets (set secret.existingSecret).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wc2026.secretName" . }}
  labels:
    {{- include "wc2026.labels" . | nindent 4 }}
type: Opaque
stringData:
  SESSION_SIGNING_SECRET: {{ required "secret.sessionSigningSecret is required when secret.create=true" .Values.secret.sessionSigningSecret | quote }}
  FOOTBALL_DATA_TOKEN: {{ .Values.secret.footballDataToken | quote }}
{{- end }}
